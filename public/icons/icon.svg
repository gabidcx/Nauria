<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Background circle -->
  <rect width="512" height="512" rx="112" fill="#3a6b47"/>

  <!-- Subtle inner glow ring -->
  <rect x="16" y="16" width="480" height="480" rx="100"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Leaf / stem shape (the Nauria icon mark) -->
  <!-- Main leaf -->
  <path
    d="M256 120
       C 256 120, 320 160, 340 230
       C 360 300, 310 360, 256 380
       C 202 360, 152 300, 172 230
       C 192 160, 256 120, 256 120 Z"
    fill="rgba(255,255,255,0.18)"
  />

  <!-- Inner leaf highlight -->
  <path
    d="M256 148
       C 256 148, 305 182, 320 238
       C 335 294, 295 342, 256 358
       C 217 342, 177 294, 192 238
       C 207 182, 256 148, 256 148 Z"
    fill="rgba(255,255,255,0.22)"
  />

  <!-- Centre vein line -->
  <line x1="256" y1="148" x2="256" y2="358"
        stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-linecap="round"/>

  <!-- Left veins -->
  <line x1="256" y1="210" x2="210" y2="240"
        stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="255" x2="202" y2="278"
        stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="300" x2="215" y2="316"
        stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>

  <!-- Right veins -->
  <line x1="256" y1="210" x2="302" y2="240"
        stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="255" x2="310" y2="278"
        stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="300" x2="297" y2="316"
        stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>

  <!-- Wordmark: "n" letterform at the bottom -->
  <text
    x="256" y="430"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-style="italic"
    font-size="72"
    fill="rgba(255,255,255,0.90)"
    letter-spacing="-1"
  >nauria</text>

</svg>